<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coming soon — Diego Delgado</title>
<link rel="icon" href="assets/logo-mark.svg">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="kit.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--fg); font-family: var(--font-sans); min-height: 100vh; display: grid; place-items: center; }
  .uc {
    position: relative; width: 100%; max-width: 680px; margin: 0 auto; padding: 56px 32px; text-align: center;
  }
  .uc__grid {
    position: absolute; inset: 0; pointer-events: none; opacity: .5;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 32px 32px;
    -webkit-mask-image: radial-gradient(circle at 50% 38%, #000 0%, transparent 70%);
            mask-image: radial-gradient(circle at 50% 38%, #000 0%, transparent 70%);
  }
  .uc__inner { position: relative; }
  .uc__mark {
    width: 56px; height: 56px; border: 1px solid var(--border); border-radius: var(--radius-md);
    display: grid; place-items: center; margin: 0 auto 28px; background: var(--surface); color: var(--accent);
    box-shadow: var(--shadow-md);
  }
  .uc__eyebrow {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--accent); display: inline-flex; align-items: center; gap: 8px; margin-bottom: 22px;
  }
  .uc__eyebrow .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1.8s var(--ease-out) infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
  @media (prefers-reduced-motion: reduce) { .uc__eyebrow .pulse { animation: none; } }
  .uc__title { font-family: var(--font-display); font-weight: 700; font-size: var(--text-4xl); letter-spacing: -0.02em; line-height: 1.08; margin: 0 0 18px; }
  .uc__project { color: var(--accent); }
  .uc__lead { font-size: var(--text-lg); color: var(--fg-muted); line-height: var(--leading-relaxed); max-width: 48ch; margin: 0 auto 14px; }
  .uc__sub { font-size: var(--text-sm); color: var(--fg-subtle); margin: 0 auto 36px; max-width: 44ch; }
  .uc__bar { width: 100%; max-width: 320px; height: 6px; border-radius: var(--radius-pill); background: var(--bg-muted); margin: 0 auto 40px; overflow: hidden; border: 1px solid var(--border); }
  .uc__bar span { display: block; height: 100%; width: 62%; background: var(--accent); border-radius: var(--radius-pill); }
  .uc__cta { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .uc svg { stroke-width: 1.75; }
</style>
</head>
<body>
<div class="uc">
  <div class="uc__grid"></div>
  <div class="uc__inner">
    <div class="uc__mark">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17 10 11 4 5"/><path d="M12 19h8"/></svg>
    </div>
    <span class="uc__eyebrow"><span class="pulse"></span><span id="uc-cat">Work in progress</span></span>
    <h1 class="uc__title"><span id="uc-project">This project</span><br>is under construction.</h1>
    <p class="uc__lead">I'm still writing up this case study — code, architecture notes, and a live demo are on the way.</p>
    <p class="uc__sub">Want a preview or the repo early? Reach out and I'll share what I've got.</p>
    <div class="uc__bar"><span></span></div>
    <div class="uc__cta">
      <a class="pf-btn pf-btn--primary" href="Portfolio.html#work">
        <span>Back to portfolio</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      </a>
      <a class="pf-btn pf-btn--secondary" href="mailto:diego.delgado.developer@gmail.com">
        <span>Email me</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      </a>
    </div>
  </div>
</div>
<script>
  const params = new URLSearchParams(location.search);
  const name = params.get('project');
  const cat = params.get('cat');
  if (name) {
    document.getElementById('uc-project').textContent = name;
    document.title = name + ' — coming soon';
  }
  if (cat) document.getElementById('uc-cat').textContent = cat;
</script>
</body>
</html>

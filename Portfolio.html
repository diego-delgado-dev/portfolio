<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diego Delgado — Software & Cloud Engineer</title>
<link rel="icon" href="assets/logo-mark.svg">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="kit.css">
<link rel="stylesheet" href="extra.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react" src="tweaks-panel.jsx"></script>
<script type="text/babel" data-presets="react" src="Icons.jsx"></script>
<script type="text/babel" data-presets="react" src="Primitives.jsx"></script>
<script type="text/babel" data-presets="react" src="Nav.jsx"></script>
<script type="text/babel" data-presets="react" src="Hero.jsx"></script>
<script type="text/babel" data-presets="react" src="Work.jsx"></script>
<script type="text/babel" data-presets="react" src="About.jsx"></script>
<script type="text/babel" data-presets="react" src="Stack.jsx"></script>
<script type="text/babel" data-presets="react" src="Contact.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": true,
  "showMetrics": true,
  "heroLayout": "statement",
  "cardLayout": "cards"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const theme = t.dark ? 'dark' : 'light';

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  return (
    <React.Fragment>
      <Nav theme={theme} onToggleTheme={() => setTweak('dark', !t.dark)} />
      <main>
        <Hero layout={t.heroLayout} showMetrics={t.showMetrics} />
        <Work cardLayout={t.cardLayout} showMetrics={t.showMetrics} />
        <About />
        <Stack />
        <Contact />
      </main>
      <Footer />

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakToggle label="Dark mode" value={t.dark}
                     onChange={(v) => setTweak('dark', v)} />
        <TweakSection label="Content" />
        <TweakToggle label="Show metrics" value={t.showMetrics}
                     onChange={(v) => setTweak('showMetrics', v)} />
        <TweakSection label="Hero layout" />
        <TweakRadio label="Style" value={t.heroLayout}
                    options={['statement', 'split', 'stats']}
                    onChange={(v) => setTweak('heroLayout', v)} />
        <TweakSection label="Project cards" />
        <TweakRadio label="Layout" value={t.cardLayout}
                    options={['cards', 'list', 'index']}
                    onChange={(v) => setTweak('cardLayout', v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

function mount() {
  if (!window.useTweaks || !window.Nav || !window.Hero || !window.Work || !window.About || !window.Stack || !window.Contact || !window.Footer) {
    return setTimeout(mount, 30);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
mount();
</script>
</body>
</html>
